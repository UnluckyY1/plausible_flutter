name: plausible_flutter
description: "Plausible Analytics for Flutter. Send pageviews and custom events with an offline-first queue, auto pageview tracking, and six-platform support."
version: 0.4.0
homepage: https://github.com/UnluckyY1/plausible_flutter
repository: https://github.com/UnluckyY1/plausible_flutter
issue_tracker: https://github.com/UnluckyY1/plausible_flutter/issues

topics:
  - analytics
  - plausible
  - privacy
  - telemetry
  - tracking

environment:
  sdk: ^3.11.5
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.2
  native_dio_adapter: ^1.5.1
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  connectivity_plus: ^6.1.0
  package_info_plus: ^8.1.4
  device_info_plus: ">=11.5.0 <13.0.0"
  logger: ^2.4.0
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
